name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone ViGEmClient SDK
        run: git clone --depth=1 https://github.com/nefarius/ViGEmClient.git vigem
        shell: cmd

      - name: Build ViGEmClient.lib
        run: |
          cl.exe /c /O2 /EHsc /W0 /I vigem\include vigem\src\ViGEmClient.cpp /Fo:ViGEmClient.obj
          lib.exe /OUT:ViGEmClient.lib ViGEmClient.obj
        shell: cmd

      - name: Compile nacon_bridge.exe
        run: >
          cl.exe /O2 /EHsc /W3 main.cpp
          /I vigem\include
          user32.lib shell32.lib hid.lib setupapi.lib ViGEmClient.lib
          /link /OUT:nacon_bridge.exe
        shell: cmd

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: nacon_bridge
          path: nacon_bridge.exe
