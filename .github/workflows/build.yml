name: Build nacon_bridge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── ViGEm Client SDK ─────────────────────────────────────────
      # Скачиваем заголовки и .lib из официального NuGet пакета
      - name: Install ViGEm Client SDK (NuGet)
        run: |
          nuget install ViGEmClient -Version 1.22.0.0 -OutputDirectory deps_nuget
          $pkg = Get-ChildItem -Path deps_nuget -Filter "ViGEmClient.*" -Directory | Select-Object -First 1
          Write-Host "Found: $($pkg.FullName)"

          # Создаём нужную структуру папок
          New-Item -ItemType Directory -Force -Path "deps\ViGEmClient\include\ViGEm"
          New-Item -ItemType Directory -Force -Path "deps\ViGEmClient\lib\Release\x64"

          # Копируем заголовки
          Copy-Item "$($pkg.FullName)\include\ViGEm\*" `
                    "deps\ViGEmClient\include\ViGEm\" -Recurse

          # Копируем .lib (x64 Release)
          Copy-Item "$($pkg.FullName)\lib\release\x64\ViGEmClient.lib" `
                    "deps\ViGEmClient\lib\Release\x64\ViGEmClient.lib"

          Write-Host "ViGEm SDK ready"
        shell: pwsh

      # ── Настройка MSVC через Developer Command Prompt ────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── CMake configure ──────────────────────────────────────────
      - name: CMake Configure
        run: |
          cmake -B build -S . `
            -G "NMake Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DVIGEM_INCLUDE_DIR="${{ github.workspace }}/deps/ViGEmClient/include" `
            -DVIGEM_LIB_DIR="${{ github.workspace }}/deps/ViGEmClient/lib/Release/x64"
        shell: pwsh

      # ── CMake build ───────────────────────────────────────────────
      - name: CMake Build
        run: cmake --build build --config Release
        shell: pwsh

      # ── Проверяем что .exe создан ─────────────────────────────────
      - name: Verify output
        run: |
          if (Test-Path "build\nacon_bridge.exe") {
            Write-Host "BUILD SUCCESS: nacon_bridge.exe"
            Get-Item "build\nacon_bridge.exe" | Select-Object Name, Length
          } else {
            Write-Error "BUILD FAILED: nacon_bridge.exe not found"
            exit 1
          }
        shell: pwsh

      # ── Upload artifact ───────────────────────────────────────────
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: nacon-bridge-exe
          path: build/nacon_bridge.exe
          retention-days: 30
