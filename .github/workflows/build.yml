name: Build Nacon EXE
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Compile
        run: |
          cl.exe /O2 /EHsc main.cpp /I. user32.lib shell32.lib hid.lib setupapi.lib /link /OUT:nacon_bridge.exe
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Nacon-Bridge-EXE
          path: nacon_bridge.exe
